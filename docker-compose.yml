services:
  worldcup:
    build:
      context: .
      args:
        COMMIT: ${COMMIT:-unknown}
    image: worldcup:latest
    environment:
      - ODDS_API_KEY=${ODDS_API_KEY}
      - NODE_ENV=production
    volumes:
      - worldcup-data:/app/data
    restart: unless-stopped
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.worldcup.rule=Host(`wc.multilateral.me`)"
      - "traefik.http.routers.worldcup.entrypoints=websecure"
      - "traefik.http.routers.worldcup.tls.certresolver=letsencrypt"
      - "traefik.http.services.worldcup.loadbalancer.server.port=3001"

volumes:
  worldcup-data:

networks:
  traefik-net:
    external: true
